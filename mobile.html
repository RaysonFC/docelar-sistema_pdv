<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Docelar — Caixa Mobile</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style-mobile.css">
</head>
<body>

<header>
  <div>
    <h1>Docelar</h1>
    <span>Sistema de Caixa</span>
  </div>
  <a href="relatorio.html" class="nav-link">📊 Relatório</a>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn ativo" id="tab-cardapio" onclick="mostrarTab('cardapio')">
    🧁 Cardápio
  </button>
  <button class="tab-btn" id="tab-caixa" onclick="mostrarTab('caixa')">
    🧾 Pedido
    <span class="badge-tab" id="badge-tab">0</span>
  </button>
</div>

<!-- SEÇÃO CARDÁPIO -->
<div class="secao ativa" id="secao-cardapio">
  <div class="cardapio">
    <div class="categoria-card">
      <div class="categoria-titulo">Mini Vulcão</div>
      <div class="itens-grid" id="grid-vulcao"></div>
    </div>
    <div class="categoria-card">
      <div class="categoria-titulo">Bolo no Pote</div>
      <div class="itens-grid" id="grid-bolo"></div>
    </div>
    <div class="categoria-card">
      <div class="categoria-titulo">Brownie</div>
      <div class="itens-grid" id="grid-brownie"></div>
    </div>
  </div>
</div>

<!-- SEÇÃO CAIXA -->
<div class="secao" id="secao-caixa">
  <div class="caixa">
    <div class="caixa-header">
      🧾 Pedido atual <span id="badge-qtd" class="badge" style="display:none">0</span>
    </div>
    <div class="caixa-body">
      <div class="pedido-lista" id="pedido-lista">
        <div class="pedido-vazio">Nenhum item adicionado ainda...</div>
      </div>
      <hr class="divider">
      <div class="resumo">
        <div class="resumo-linha"><span>Itens</span><span id="res-itens">0</span></div>
        <div class="resumo-total"><span>Total</span><span id="res-total">R$ 0,00</span></div>
      </div>
      <div class="pagamento-section">
        <div class="pagamento-titulo">💳 Forma de pagamento</div>
        <div class="formas-grid">
          <button class="forma-btn" onclick="selecionarPagamento(this, 'Dinheiro')">💵 Dinheiro</button>
          <button class="forma-btn" onclick="selecionarPagamento(this, 'Pix')">📱 Pix</button>
          <button class="forma-btn" onclick="selecionarPagamento(this, 'Débito')">💳 Débito</button>
          <button class="forma-btn" onclick="selecionarPagamento(this, 'Crédito')">💳 Crédito</button>
        </div>
        <div id="troco-section" style="display:none">
          <div class="input-label">Valor recebido (R$)</div>
          <input type="number" class="input-valor" id="valor-recebido" placeholder="0,00" step="0.01" oninput="calcularTroco()">
          <div class="troco-valor" id="troco-valor"></div>
        </div>
        <button class="btn-finalizar" id="btn-finalizar" onclick="finalizarVenda()" disabled>Finalizar Venda</button>
        <button class="btn-limpar" onclick="limparPedido()">🗑️ Limpar pedido</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL — sobe de baixo no mobile -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-icon">🎉</div>
    <h2>Venda concluída!</h2>
    <p>Pedido registrado com sucesso. Abaixo o resumo:</p>
    <div class="cupom-box" id="cupom-conteudo"></div>
    <div>
      <button class="modal-btn" onclick="novaVenda()">Nova venda</button>
      <button class="modal-btn secundario" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Controle das tabs
  function mostrarTab(tab) {
    const secCardapio = document.getElementById('secao-cardapio');
    const secCaixa = document.getElementById('secao-caixa');
    const btnCardapio = document.getElementById('tab-cardapio');
    const btnCaixa = document.getElementById('tab-caixa');

    if (tab === 'cardapio') {
      secCardapio.classList.add('ativa');
      secCaixa.classList.remove('ativa');
      btnCardapio.classList.add('ativo');
      btnCaixa.classList.remove('ativo');
    } else {
      secCaixa.classList.add('ativa');
      secCardapio.classList.remove('ativa');
      btnCaixa.classList.add('ativo');
      btnCardapio.classList.remove('ativo');
    }
  }

  // Atualizar badge da tab de pedido
  function atualizarBadgeTab() {
    const total = pedido.reduce((s, i) => s + i.qtd, 0);
    const badge = document.getElementById('badge-tab');
    if (badge) {
      badge.textContent = total;
      badge.style.display = total > 0 ? 'inline' : 'none';
    }
  }

  // Patch: sobrescrever renderPedido para atualizar badge da tab
  const _origRenderPedido = renderPedido;
  window.renderPedido = function() {
    _origRenderPedido();
    atualizarBadgeTab();
  };

  // Ao adicionar item no mobile, ir automaticamente para aba de pedido após 0.3s
  const _origAdicionarItem = adicionarItem;
  window.adicionarItem = function(item) {
    _origAdicionarItem(item);
    // Feedback visual: pisca o badge da tab
    const badge = document.getElementById('badge-tab');
    if (badge) {
      badge.style.transform = 'scale(1.4)';
      setTimeout(() => { badge.style.transform = 'scale(1)'; }, 200);
    }
  };

  // Inicializar badge
  atualizarBadgeTab();
</script>
</body>
</html>
